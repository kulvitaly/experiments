services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: budgetmanager
      POSTGRES_USER: budgetmanager
      POSTGRES_PASSWORD: budgetmanager
    ports:
      - '5555:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
    driver: local
