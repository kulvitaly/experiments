schema {
  query: Query
  mutation: Mutation
}

type Category {
  id: UUID! @cost(weight: "10")
  name: String!
  iconUrl: String!
  type: CategoryType!
  familyId: UUID! @cost(weight: "10")
  family: Family! @cost(weight: "10")
}

type Family {
  id: UUID! @cost(weight: "10")
  name: String!
  iconUrl: String
}

type Mutation {
  addIncomeCategory(name: String! iconUrl: String! familyId: UUID!): Category @cost(weight: "10")
  addExpenseCategory(name: String! iconUrl: String! familyId: UUID!): Category @cost(weight: "10")
  registerFamily(name: String! iconUrl: String): Family @cost(weight: "10")
  createUser(name: String! iconUrl: String! familyId: UUID): User @cost(weight: "10")
  updateUser(id: UUID! name: String! iconUrl: String!): User @cost(weight: "10")
  deleteUser(id: UUID!): Boolean! @cost(weight: "10")
  addWallet(name: String! iconUrl: String! type: WalletType! userId: UUID!): Wallet @cost(weight: "10")
  editWallet(id: UUID! name: String! iconUrl: String! type: WalletType!): Wallet @cost(weight: "10")
  deleteWallet(id: UUID!): Boolean! @cost(weight: "10")
}

type Query {
  incomeCategories(familyId: UUID!): [Category] @cost(weight: "10")
  expenseCategories(familyId: UUID!): [Category] @cost(weight: "10")
  families: [Family] @cost(weight: "10")
  users: [User] @cost(weight: "10")
  wallets(familyId: UUID! userId: UUID): [Wallet] @cost(weight: "10")
}

type User {
  id: UUID! @cost(weight: "10")
  name: String!
  iconUrl: String!
  familyId: UUID @cost(weight: "10")
  family: Family @cost(weight: "10")
}

type Wallet {
  id: UUID! @cost(weight: "10")
  name: String!
  iconUrl: String!
  type: WalletType!
  ownerId: UUID! @cost(weight: "10")
  owner: User! @cost(weight: "10")
}

enum CategoryType {
  INCOME
  EXPENSE
}

enum WalletType {
  CASH
  DEBIT_CARD
  CREDIT_CARD
  SAVINGS
}

"The purpose of the `cost` directive is to define a `weight` for GraphQL types, fields, and arguments. Static analysis can use these weights when calculating the overall cost of a query or response."
directive @cost("The `weight` argument defines what value to add to the overall cost for every appearance, or possible appearance, of a type, field, argument, etc." weight: String!) on SCALAR | OBJECT | FIELD_DEFINITION | ARGUMENT_DEFINITION | ENUM | INPUT_FIELD_DEFINITION

"The `@specifiedBy` directive is used within the type system definition language to provide a URL for specifying the behavior of custom scalar definitions."
directive @specifiedBy("The specifiedBy URL points to a human-readable specification. This field will only read a result for scalar types." url: String!) on SCALAR

scalar UUID @specifiedBy(url: "https:\/\/tools.ietf.org\/html\/rfc4122")